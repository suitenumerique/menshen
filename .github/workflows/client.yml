name: Client Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
    paths:
      - src/client/**

permissions: {}

jobs:

  build-client:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    defaults:
      run:
        working-directory: src/client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
          version: "0.11.27"
          enable-cache: true

      - name: Build the project
        run: uv sync --locked --all-extras --dev
        
  lint-client:
    needs: build-client
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    defaults:
      run:
        working-directory: src/client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
          version: "0.11.27"
          enable-cache: true

      - name: Check code formatting with ruff
        run: uv run ruff format . --diff

      - name: Lint code with ruff
        run: uv run ruff check .

      - name: Check types with ty
        run: uv run ty check

  test-client:
    needs: build-client
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    defaults:
      run:
        working-directory: src/client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
          version: "0.11.27"
          enable-cache: true

      - name: Run tests
        run: uv run pytest
